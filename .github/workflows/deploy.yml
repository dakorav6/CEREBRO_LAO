name: Deploy MkDocs
on:
  push:
    branches:
      - main  # Verifica que tu rama se llame main (en tu terminal dice entre paréntesis)
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - run: pip install mkdocs-material
      - run: mkdocs gh-deploy --force

      